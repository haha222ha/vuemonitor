global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vuemonitor-server"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["server:8000"]
        labels:
          service: "vuemonitor-api"
          env: "production"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]