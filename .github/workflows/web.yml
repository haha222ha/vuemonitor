name: Web CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "web-admin/**"
      - "web-user/**"
  pull_request:
    branches: [main]
    paths:
      - "web-admin/**"
      - "web-user/**"

env:
  NODE_VERSION: "20"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [web-admin, web-user]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --ext .ts,.vue --max-warnings 0
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-dist
          path: ${{ matrix.project }}/dist/

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        project: [web-admin, web-user]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.project }}
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'xhs365' }}/vuemonitor-${{ matrix.project }}:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'xhs365' }}/vuemonitor-${{ matrix.project }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
