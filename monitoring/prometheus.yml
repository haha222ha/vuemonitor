global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "vuemonitor-server"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["server:8000"]
        labels:
          service: "vuemonitor"
          component: "api"
