server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# 用户前端 — www.xhs365.cn / xhs365.cn
server {
    listen 443 ssl http2;
    server_name www.xhs365.cn xhs365.cn;

    ssl_certificate /etc/letsencrypt/live/api.xhs365.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xhs365.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/vuemonitor/web-user/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# 管理后台 — admin.xhs365.cn
server {
    listen 443 ssl http2;
    server_name admin.xhs365.cn;

    ssl_certificate /etc/letsencrypt/live/api.xhs365.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xhs365.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/vuemonitor/web-admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API 服务 — api.xhs365.cn
server {
    listen 443 ssl http2;
    server_name api.xhs365.cn;

    ssl_certificate /etc/letsencrypt/live/api.xhs365.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xhs365.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }
}
