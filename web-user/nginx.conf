server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.xhs365.cn xhs365.cn;

    ssl_certificate /etc/letsencrypt/live/www.xhs365.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.xhs365.cn/privkey.pem;

    root /opt/vuemonitor/web-user/dist;
    index index.html;

    # 用户前端 — 营销页 + 登录 + Dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 管理后台 — 独立前端
    location /admin {
        alias /opt/vuemonitor/web-admin/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
