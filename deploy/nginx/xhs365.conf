server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ===== WebSocket 代理 =====
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ===== 健康检查 =====
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # ===== Prometheus 指标（仅内网访问）=====
    location /metrics {
        proxy_pass http://127.0.0.1:8000;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ===== 客户端下载服务 =====
    location /downloads/ {
        alias /var/www/xhs365/downloads/;
        autoindex off;

        # CORS 头（允许客户端跨域下载）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        # 缓存策略
        location ~* \.(exe|dmg|AppImage|deb|rpm|zip)$ {
            add_header Content-Disposition 'attachment';
            add_header Cache-Control "public, max-age=3600";
        }

        # 版本清单（客户端自动更新用）
        location ~* \.(json|yml)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Content-Type "application/json";
        }
    }

    # ===== 自动更新服务 =====
    location /updates/ {
        alias /var/www/xhs365/downloads/;
        autoindex off;

        add_header Cache-Control "no-cache, must-revalidate";

        # electron-updater 查找 latest.yml
        location ~* latest\.yml$ {
            add_header Content-Type "text/yaml";
        }

        # macOS 更新查找
        location ~* latest-mac\.yml$ {
            add_header Content-Type "text/yaml";
        }

        # Linux 更新查找
        location ~* latest-linux\.yml$ {
            add_header Content-Type "text/yaml";
        }
    }

    # ===== Web 用户端静态文件 =====
    location / {
        root /var/www/xhs365/web-user/dist;
        try_files $uri $uri/ /index.html;

        # SPA 路由支持
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:;" always;

    # ===== 日志 =====
    access_log /var/log/nginx/xhs365_access.log;
    error_log /var/log/nginx/xhs365_error.log;
}